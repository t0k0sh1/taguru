name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      # --all-targets reaches the examples too, which cargo test never
      # builds; -D warnings holds the tree at its current zero.
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      # Unit tests (lib + server + MCP bridge), the HTTP integration
      # tests (spawn the real binary on a free port), and the QA recall
      # floor all run here; --locked pins the committed Cargo.lock.
      - name: Test
        run: cargo test --locked

  # Independent of `check`: no Rust toolchain needed, and a newly
  # published CVE turning this red on an unrelated PR is a different
  # signal from a fmt/clippy/test failure.
  advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  # Separate from `check`: the instrumented build roughly doubles the
  # runtime, which would slow down the fast fmt/clippy/test feedback.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Clean coverage artifacts
        run: cargo llvm-cov clean --workspace
      - name: Run instrumented tests
        run: cargo llvm-cov --workspace --locked --no-report
      - name: Per-file summary
        run: |
          cargo llvm-cov report > coverage-summary.txt
          {
            echo "### Coverage (line/region/function, per source file)"
            echo
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: LCOV report
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info
      - name: HTML report
        run: cargo llvm-cov report --html
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage-summary.txt
            target/llvm-cov/lcov.info
            target/llvm-cov/html
          if-no-files-found: error
          retention-days: 14

  # Full mutation runs are intentionally local and module-scoped. On a
  # pull request, mutate only production lines touched since the merge
  # base so the feedback stays bounded by the size of the change. A wide
  # audit diff can still spawn dozens of mutants, each its own build+test,
  # so run two at a time (safe on the runner's cores and disk) and give
  # the job a ceiling that clears a large change rather than one tuned to
  # a small one — the job still ends the moment the mutants finish, so the
  # higher ceiling costs nothing on an ordinary PR.
  mutants:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@c28c615c385dc3e96ea7a032f6586e24a50476cf
        with:
          tool: cargo-mutants@27.1.0
      - name: Build pull-request diff
        run: git diff "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > pr.diff
      - name: Test mutants in changed code
        run: cargo mutants --workspace --in-diff pr.diff --jobs 2
      # A diff with no Rust source changes (deps-only bumps, workflow
      # tweaks, etc.) makes cargo-mutants exit early without writing
      # mutants.out at all; create it so the upload step below has
      # something to find instead of failing the whole job over it.
      - name: Ensure mutants output directory exists
        if: always()
        run: mkdir -p mutants.out
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-in-diff
          path: mutants.out
          if-no-files-found: error
          retention-days: 14
