name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      # --all-targets reaches the examples too, which cargo test never
      # builds; -D warnings holds the tree at its current zero.
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      # Unit tests (lib + server + MCP bridge), the HTTP integration
      # tests (spawn the real binary on a free port), and the QA recall
      # floor all run here; --locked pins the committed Cargo.lock.
      - name: Test
        run: cargo test --locked

  # Independent of `check`: no Rust toolchain needed, and a newly
  # published CVE turning this red on an unrelated PR is a different
  # signal from a fmt/clippy/test failure.
  advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  # Separate from `check`: the instrumented build roughly doubles the
  # runtime, which would slow down the fast fmt/clippy/test feedback.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run instrumented tests
        run: cargo llvm-cov --locked --no-report
      - name: Per-file summary
        run: |
          {
            echo "### Coverage (line/region/function, per source file)"
            echo
            echo '```'
            cargo llvm-cov report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: HTML report
        run: cargo llvm-cov report --html
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: target/llvm-cov/html
          retention-days: 14
