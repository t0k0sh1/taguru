name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      # --all-targets reaches the examples too, which cargo test never
      # builds; -D warnings holds the tree at its current zero.
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      # Unit tests (lib + server + MCP bridge), the HTTP integration
      # tests (spawn the real binary on a free port), and the QA recall
      # floor all run here; --locked pins the committed Cargo.lock.
      - name: Test
        run: cargo test --locked

  # Independent of `check`: no Rust toolchain needed, and a newly
  # published CVE turning this red on an unrelated PR is a different
  # signal from a fmt/clippy/test failure.
  advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  # Separate from `check`: the instrumented build roughly doubles the
  # runtime, which would slow down the fast fmt/clippy/test feedback.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run instrumented tests
        run: cargo llvm-cov --workspace --locked --no-report
      - name: Per-file summary
        run: |
          cargo llvm-cov report > coverage-summary.txt
          {
            echo "### Coverage (line/region/function, per source file)"
            echo
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: LCOV report
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info
      - name: HTML report
        run: cargo llvm-cov report --html
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage-summary.txt
            target/llvm-cov/lcov.info
            target/llvm-cov/html
          retention-days: 14

  # Full mutation runs are intentionally local and module-scoped. On a
  # pull request, mutate only production lines touched since the merge
  # base so the feedback stays bounded by the size of the change.
  mutants:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-mutants
      - name: Build pull-request diff
        run: git diff "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > pr.diff
      - name: Test mutants in changed code
        run: cargo mutants --workspace --in-diff pr.diff
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-in-diff
          path: mutants.out
          retention-days: 14
