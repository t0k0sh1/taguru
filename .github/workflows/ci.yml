name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      # --all-targets reaches the examples too, which cargo test never
      # builds; -D warnings holds the tree at its current zero.
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      # Unit tests (lib + server + MCP bridge), the HTTP integration
      # tests (spawn the real binary on a free port), and the QA recall
      # floor all run here; --locked pins the committed Cargo.lock.
      - name: Test
        run: cargo test --locked

  # Independent of `check`: no Rust toolchain needed, and a newly
  # published CVE turning this red on an unrelated PR is a different
  # signal from a fmt/clippy/test failure.
  advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  # Coverage and per-PR mutation testing used to run here too. Both
  # retired to keep CI at the signals that gate a merge: coverage
  # produced a report nobody's decision hung on, and diff-scoped
  # mutants stopped fitting a CI budget the moment a PR carried a new
  # module (a ~1.5k-line diff is hundreds of mutants, each its own
  # build+test — see #140, which timed out the hour ceiling). Mutation
  # runs remain a local, module-scoped tool: `cargo mutants` with the
  # `[profile.mutants]` in Cargo.toml.
