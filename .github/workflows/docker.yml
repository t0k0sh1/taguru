name: Docker

# Publishes ghcr.io/t0k0sh1/taguru. Version tags (v*) produce the
# semver tags plus `latest`; a manual run from main produces `edge`.
# Two native jobs — a QEMU-emulated Rust release build is ~10× slower
# than the free arm64 runner — each push by digest; a publish job
# stitches the digests into one multi-arch manifest and signs it; and
# a verify job re-checks the published result from a consumer's seat.
# Auth is the workflow's own GITHUB_TOKEN (packages: write); no
# secrets exist.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Tags are decided at the manifest step; this run only supplies
      # the OCI labels (source/description/licenses and friends).
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # Every pushed image carries its bill of materials and a
          # max-detail provenance attestation — what went in, built
          # where, from which commit.
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.meta.outputs.version }}
    permissions:
      packages: write
      # Keyless signing: the OIDC token IS the identity cosign binds
      # the signature to (this workflow, this repo, this ref).
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
      - name: Assemble and push the multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)
      - name: Verify the published manifest
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
      # Sign the manifest-list digest keylessly (Sigstore). The
      # consumer command lives in SECURITY.md ("Verifying a release")
      # and pins the exact workflow identity — an unanchored
      # 'github.com/t0k0sh1/taguru' regexp would also match a
      # look-alike repo named t0k0sh1/taguru-anything.
      - uses: sigstore/cosign-installer@v3
      - name: Sign the published manifest
        run: |
          digest="$(docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest}}' | jq -r .digest)"
          cosign sign --yes "$IMAGE@$digest"

  # The publisher inspecting what it just pushed proves nothing — this
  # job is the release dry-run from a clean machine: a blank runner, no
  # registry login, no OIDC token, exactly the consumer's seat. The
  # SBOM floor guards the failure mode that actually shipped twice:
  # a formally attached SPDX document cataloguing zero crates (a
  # scratch image gives the scanner nothing unless the binary itself
  # carries its dependency list — that is what `cargo auditable` in
  # the Dockerfile is for; the runtime crate list is ~200 strong).
  verify:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    env:
      TAG: ${{ needs.publish.outputs.version }}
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v3
      - name: The signature must bind this workflow's exact identity
        run: |
          cosign verify "$IMAGE:$TAG" \
            --certificate-identity "${{ github.server_url }}/${{ github.repository }}/.github/workflows/docker.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: The SBOM must carry the crate list, per architecture
        run: |
          docker buildx imagetools inspect "$IMAGE:$TAG" --format '{{json .SBOM}}' \
            | jq -e '(keys | length) >= 2 and all(.[]; (.SPDX.packages | length) >= 100)' \
            || { echo "SBOM missing or vacuous — is the binary still built with cargo auditable?" >&2; exit 1; }
      - name: The provenance must name this repository's build
        run: |
          docker buildx imagetools inspect "$IMAGE:$TAG" --format '{{json .Provenance}}' \
            | jq -e --arg prefix "${{ github.server_url }}/${{ github.repository }}/actions/runs/" \
                '(keys | length) >= 2 and all(.[]; .SLSA.runDetails.builder.id | startswith($prefix))' \
            || { echo "provenance missing, or its builder is not this repository's Actions run" >&2; exit 1; }
