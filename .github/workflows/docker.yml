name: Docker

# Publishes ghcr.io/t0k0sh1/taguru. Version tags (v*) produce the
# semver tags plus `latest`; a manual run from main produces `edge`.
# Two native jobs — a QEMU-emulated Rust release build is ~10× slower
# than the free arm64 runner — each push by digest, and a final job
# stitches the digests into one multi-arch manifest. Auth is the
# workflow's own GITHUB_TOKEN (packages: write); no secrets exist.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Tags are decided at the manifest step; this run only supplies
      # the OCI labels (source/description/licenses and friends).
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # Every pushed image carries its bill of materials and a
          # max-detail provenance attestation — what went in, built
          # where, from which commit.
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
      # Keyless signing: the OIDC token IS the identity cosign binds
      # the signature to (this workflow, this repo, this ref).
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
      - name: Assemble and push the multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)
      - name: Verify the published manifest
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
      # Sign the manifest-list digest keylessly (Sigstore): consumers
      # verify with
      #   cosign verify ghcr.io/t0k0sh1/taguru:TAG \
      #     --certificate-identity-regexp 'github.com/t0k0sh1/taguru' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - uses: sigstore/cosign-installer@v3
      - name: Sign the published manifest
        run: |
          digest="$(docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest}}' | jq -r .digest)"
          cosign sign --yes "$IMAGE@$digest"
