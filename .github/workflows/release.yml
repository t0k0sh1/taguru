name: Release

# Version tags (v*) cut the release surface the Docker workflow does
# not: a GitHub Release whose body is that version's CHANGELOG
# section, and the crates.io publish. The two jobs are independent —
# a crates.io hiccup must not block the release notes, and vice
# versa.

on:
  push:
    tags: ["v*"]

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      # The body is the CHANGELOG section for this exact version —
      # release notes are written once, in the file that outlives the
      # release page. A tag whose section is missing fails loudly:
      # cutting a release without notes is the mistake, not the check.
      - name: Extract this version's changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > "${{ runner.temp }}/notes.md"
          if ! grep -q '[^[:space:]]' "${{ runner.temp }}/notes.md"; then
            echo "CHANGELOG.md has no section for ${version} — add one before tagging" >&2
            exit 1
          fi
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "taguru $GITHUB_REF_NAME" \
            --notes-file "${{ runner.temp }}/notes.md" \
            --verify-tag

  crates-io:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # The tag must name the version Cargo.toml carries — publishing
      # v0.2.0 from a tree that still says 0.1.0 is the classic
      # release-day mismatch.
      - name: Tag and Cargo.toml must agree
        run: |
          version="${GITHUB_REF_NAME#v}"
          manifest="$(cargo pkgid | sed 's/.*[@#]//')"
          if [ "$version" != "$manifest" ]; then
            echo "tag says ${version}, Cargo.toml says ${manifest}" >&2
            exit 1
          fi
      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked
      - name: Note the skip
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping the crates.io publish" >&2
