name: SDK Release

# The four SDK packages carry the server's own version — one release,
# one number everywhere (sdk/spec/check_versions.py pins the lockstep).
# The same v* tag that cuts the server release (release.yml: GitHub
# Release + crates.io) publishes them all:
#
#   v0.2.0 → PyPI taguru + langchain-taguru
#          → npm  taguru + langchain-taguru
#
# Mirroring release.yml's conventions: the tag must agree with every
# version site. PyPI publishes with the PYPI_API_TOKEN secret and skips
# loudly while it is missing; npm uses trusted publishing (OIDC — no
# secret lives here). Re-runs are safe — a version already on the
# registry is skipped, not an error.

on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Tag and every version site must agree
        run: python sdk/spec/check_versions.py --expect "${GITHUB_REF_NAME#v}"
      - name: Build both packages
        run: |
          python -m pip install --upgrade build twine
          python -m build sdk/python
          python -m build sdk/python-langchain
          python -m twine check sdk/python/dist/* sdk/python-langchain/dist/*
      - name: Publish to PyPI (taguru, then langchain-taguru)
        if: env.PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing sdk/python/dist/* sdk/python-langchain/dist/*
      - name: Note the skip
        if: env.PYPI_API_TOKEN == ''
        run: echo "PYPI_API_TOKEN is not configured; skipping the PyPI publish" >&2

  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Trusted publishing: the job's OIDC token is the credential — no
    # npm secret. Each package's trusted publisher must be configured on
    # npmjs.com (user t0k0sh1, repository taguru, workflow
    # sdk-release.yml, environment blank), which npmjs.com only offers
    # once the package exists: publish the first version locally,
    # configure, then re-run this job — published versions are skipped,
    # so the re-run goes green. --provenance stays explicit; the
    # automatic attestation the docs promise has proven unreliable.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # Node 22 bundles npm 10.x; trusted publishing needs >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@^11.5.1
      - name: Tag and every version site must agree
        run: python3 sdk/spec/check_versions.py --expect "${GITHUB_REF_NAME#v}"
      - name: Install and build both packages
        working-directory: sdk
        run: |
          npm install --no-fund --no-audit
          npm run build --workspace=taguru
          npm run build --workspace=langchain-taguru
      - name: Publish to npm (core first — langchain-taguru depends on it)
        working-directory: sdk
        run: |
          version="${GITHUB_REF_NAME#v}"
          for pkg in taguru langchain-taguru; do
            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "${pkg}@${version} is already on npm; skipping"
            else
              npm publish --provenance --access public --workspace="$pkg"
            fi
          done
