name: SDK

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Both SDK integration suites drive the REAL server binary; build it once
  # and hand it to the language jobs as an artifact.
  build-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build server binary
        run: cargo build --locked --bin taguru
      - uses: actions/upload-artifact@v7
        with:
          name: taguru-server-binary
          path: target/debug/taguru

  python:
    needs: build-server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v8
        with:
          name: taguru-server-binary
          path: bin
      - run: chmod +x bin/taguru
      - name: Install packages
        # setuptools rides along: the runner's tool-cache copy lags
        # behind known advisories, and the environment audit below
        # rightly refuses to look away.
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e "sdk/python[dev]" -e "sdk/python-langchain[dev]"
      # Audit the environment the install step just resolved, the way the
      # typescript job audits its installed workspace. Handing pip-audit a
      # project directory re-resolves it from PyPI instead, which fails at
      # release time: the langchain package then requires a core version
      # the tag has not published yet. --skip-editable exempts only the
      # two local packages themselves; their dependency trees are still
      # audited.
      - name: Audit dependencies
        run: pip-audit --skip-editable
      - name: Lint (core)
        run: |
          ruff check sdk/python/src sdk/python/scripts sdk/python/tests
          ruff format --check sdk/python/src sdk/python/scripts sdk/python/tests
      - name: Lint (langchain)
        run: |
          ruff check sdk/python-langchain/src sdk/python-langchain/tests
          ruff format --check sdk/python-langchain/src sdk/python-langchain/tests
      - name: Typecheck
        run: |
          mypy --config-file sdk/python/pyproject.toml sdk/python/src
          mypy --config-file sdk/python-langchain/pyproject.toml sdk/python-langchain/src
      - name: Sync client freshness (unasync)
        run: |
          python sdk/python/scripts/generate_sync.py
          git diff --exit-code sdk/python/src/taguru/_sync
      - name: Surface parity
        run: python sdk/python/scripts/check_surface.py
      - name: Version lockstep (SDK packages carry the server's version)
        run: python sdk/spec/check_versions.py
      - name: Test (core)
        run: python -m pytest sdk/python/tests -q
        env:
          TAGURU_TEST_BIN: ${{ github.workspace }}/bin/taguru
      - name: Test (langchain)
        run: python -m pytest sdk/python-langchain/tests -q
        env:
          TAGURU_TEST_BIN: ${{ github.workspace }}/bin/taguru
      # The use-case examples double as end-to-end smoke tests: each spawns
      # the real binary and runs offline on canned fake chat models.
      - name: Run examples
        run: |
          for main in examples/langchain/*/python/main.py; do
            echo "--- $main"
            python "$main"
          done
        env:
          TAGURU_TEST_BIN: ${{ github.workspace }}/bin/taguru

  typescript:
    needs: build-server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: actions/download-artifact@v8
        with:
          name: taguru-server-binary
          path: bin
      - run: chmod +x bin/taguru
      - name: Install workspace
        run: npm install --no-fund --no-audit
        working-directory: sdk
      - name: Audit dependencies
        run: npm audit --workspaces --audit-level=high
        working-directory: sdk
      - name: Build packages (langchain-taguru consumes taguru's dist; the examples consume both)
        run: |
          npm run build --workspace=taguru
          npm run build --workspace=langchain-taguru
        working-directory: sdk
      - name: Lint
        run: |
          npm run lint --workspace=taguru
          npm run lint --workspace=langchain-taguru
        working-directory: sdk
      - name: Typecheck
        run: |
          npm run typecheck --workspace=taguru
          npm run typecheck --workspace=langchain-taguru
        working-directory: sdk
      - name: Surface parity
        run: npm run check:surface --workspace=taguru
        working-directory: sdk
      - name: Test (core)
        run: npm test --workspace=taguru
        working-directory: sdk
        env:
          TAGURU_TEST_BIN: ${{ github.workspace }}/bin/taguru
      - name: Test (langchain)
        run: npm test --workspace=langchain-taguru
        working-directory: sdk
        env:
          TAGURU_TEST_BIN: ${{ github.workspace }}/bin/taguru
      # The use-case examples double as end-to-end smoke tests: each spawns
      # the real binary and runs offline on canned fake chat models. Their
      # workspace pack-copies the file: SDK dependencies (see the .npmrc), so
      # this install must come after the build step above.
      - name: Install examples workspace
        run: npm install --no-fund --no-audit
        working-directory: examples/langchain
      - name: Run examples
        # npm's own workspace resolution, not a shell glob — */typescript
        # also matches node_modules/typescript (the compiler package).
        run: |
          npm run typecheck --workspaces
          npm run start --workspaces
        working-directory: examples/langchain
        env:
          TAGURU_TEST_BIN: ${{ github.workspace }}/bin/taguru
