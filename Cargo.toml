[package]
name = "taguru"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
axum = "0.8.9"
ureq = { version = "2.12.1", features = ["json"] }
unicode-normalization = "0.1.25"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "net", "signal", "time"] }
