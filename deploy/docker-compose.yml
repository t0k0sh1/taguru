# Taguru under docker compose — one writer, one named volume, the
# probes the image ships with.
#
#   TAGURU_API_TOKENS='ops:CHANGE-ME' docker compose up -d
#
# The port stays on loopback: expose it beyond this host only behind
# a TLS-terminating reverse proxy (a bearer token is the whole
# credential), and set TAGURU_RATE_LIMIT_PER_MIN when you do.
services:
  taguru:
    image: ghcr.io/t0k0sh1/taguru:0.3.0 # pin; `latest` moves
    ports:
      - "127.0.0.1:8248:8248"
    environment:
      TAGURU_API_TOKENS: ${TAGURU_API_TOKENS:?set TAGURU_API_TOKENS=name:token}
      # Continuous off-host replication (recover with `taguru restore`):
      #   TAGURU_REPLICATE_URL: s3://my-bucket/taguru
      # plus that cloud's usual credential variables (AWS_*, etc).
      # Scope keys, budgets, and the embedding tier live here too —
      # `taguru --help` lists every knob; `--env-file` reads the same
      # KEY=VALUE file `taguru --config` does.
    volumes:
      - taguru-data:/data
    read_only: true # /data is the only write target
    restart: unless-stopped
    # `docker stop` is a graceful shutdown: it drains in-flight requests
    # before the final flush + usage sweep. If the embedding tier is on,
    # a request that lands mid-embed can hold that drain for
    # TAGURU_EMBED_TIMEOUT_SECS × 3 retries — 180s at the defaults, since
    # the provider call can't be preempted by the request timeout. Too
    # short a grace period here gets the process SIGKILLed mid-drain
    # instead (writes are still safe: the WAL replays them on the next
    # boot, but the in-flight response and the final flush are lost).
    # Raise this alongside TAGURU_EMBED_TIMEOUT_SECS if you widen that.
    stop_grace_period: 200s

volumes:
  taguru-data:
